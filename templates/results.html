<!DOCTYPE html>
<html>
<head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Scan Results</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
        <link rel="stylesheet" href="/static/css/styles.css">
        </head>
<body class="bg-light">
    <nav class="navbar navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="/">SOHO Security Framework</a>
        </div>
    </nav>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow-sm">
                    <div class="card-body">
                        <h3 class="card-title mb-3">Scan Results</h3>

                        {% if error %}
                            <div class="alert alert-danger">Error running scan: {{ error }}</div>
                        {% endif %}

                        {% if results and results|length > 0 %}
                            <div class="table-responsive">
                                <table class="table table-striped">
                                    <thead>
                                        <tr>
                                            <th>IP</th>
                                            <th>Status</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {% for device in results %}
                                            <tr>
                                                <td>{{ device.ip }}</td>
                                                <td class="{{ 'table-status-up' if device.status == 'up' else 'table-status-down' }}">{{ device.status }}</td>
                                            </tr>
                                        {% endfor %}
                                    </tbody>
                                </table>
                            </div>
                        {% else %}
                            <div class="alert alert-secondary">No active devices found.</div>
                        {% endif %}

                        <div class="mt-3 d-flex justify-content-between">
                            <a class="btn btn-outline-secondary" href="http://127.0.0.1:5000/">Back</a>
                            <a class="btn btn-primary" href="http://127.0.0.1:5000/scan">Scan Again</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
