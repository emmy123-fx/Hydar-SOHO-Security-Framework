<!DOCTYPE html>
<html>
<head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>SOHO Security Framework</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
        <link rel="stylesheet" href="/static/css/styles.css">
        </head>
<body class="bg-light">
        <nav class="navbar navbar-dark bg-dark mb-4">
            <div class="container">
                <a class="navbar-brand" href="/">SOHO Security Framework</a>
            </div>
        </nav>

        <div class="container">
            <div class="row justify-content-center">
                <div class="col-md-7">
                    <div class="card shadow-sm">
                        <div class="card-body">
                            <h3 class="card-title mb-3">Network Scanner</h3>
                            <p class="text-muted">Enter an IP range or CIDR (example: 192.168.1.0/24) and press Start Scan.</p>

                              <form action="http://127.0.0.1:5000/scan" method="POST">
                                <div class="mb-3">
                                    <label class="form-label">IP Range</label>
                                    <input class="form-control form-control-lg" type="text" name="ip_range" placeholder="192.168.1.0/24" required>
                                </div>
                                <div class="d-flex justify-content-between align-items-center">
                                    <button class="btn btn-primary btn-lg" type="submit">Start Scan</button>
                                    <small class="text-muted">Scanning may require elevated privileges.</small>
                                </div>
                            </form>

                        </div>
                    </div>

                    <footer class="mt-4 text-center text-muted">
                        <small>Built for local network testing — not for scanning external networks.</small>
                    </footer>
                </div>
            </div>
        </div>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
