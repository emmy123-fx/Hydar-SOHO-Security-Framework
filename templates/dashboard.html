<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Dashboard - SOHO Security</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/styles.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-light">
  <nav class="navbar navbar-dark bg-dark mb-4">
    <div class="container">
      <a class="navbar-brand" href="/">SOHO Security Framework</a>
      <div>
        Logged in as {{ user.username }} | <a href="/logout" class="text-light">Logout</a>
      </div>
    </div>
  </nav>

  <div class="container">
    <div class="row">
      <div class="col-md-3">
        <div class="card mb-3">
          <div class="card-body">
            <h5>Total Scans</h5>
            <p class="display-6">{{ stats.total_scans }}</p>
          </div>
        </div>
      </div>
      <div class="col-md-3">
        <div class="card mb-3">
          <div class="card-body">
            <h5>Devices Up</h5>
            <p class="display-6">{{ stats.devices_up }}</p>
          </div>
        </div>
      </div>
      <div class="col-md-3">
        <div class="card mb-3">
          <div class="card-body">
            <h5>Vulnerabilities</h5>
            <p class="display-6">{{ stats.vuln_count }}</p>
          </div>
        </div>
      </div>
      <div class="col-md-3">
        <div class="card mb-3">
          <div class="card-body">
            <h5>Risk Level</h5>
            <p class="display-6 text-{{ 'danger' if stats.risk_level=='High' else ('warning' if stats.risk_level=='Medium' else 'success') }}">{{ stats.risk_level }}</p>
          </div>
        </div>
      </div>
    </div>

    <div class="row">
      <div class="col-md-6">
        <canvas id="severityChart"></canvas>
      </div>
      <div class="col-md-6">
        <a href="/report" class="btn btn-primary">Download Report</a>
      </div>
    </div>
  </div>

  <script>
    const ctx = document.getElementById('severityChart').getContext('2d');
    new Chart(ctx, {
      type: 'pie',
      data: {
        labels: ['High','Medium','Low'],
        datasets: [{
          data: [{{ stats.high }}, {{ stats.medium }}, {{ stats.low }}],
          backgroundColor: ['#dc3545','#ffc107','#198754']
        }]
      }
    });
  </script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
